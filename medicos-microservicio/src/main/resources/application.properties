server.port=8081
spring.application.name=medicos-microservicio

# OJO: Cambiamos 'localhost' por 'db' (el nombre del servicio en el compose)
spring.datasource.url=jdbc:mysql://db:3306/rednorte_db?createDatabaseIfNotExist=true
spring.datasource.username=root
# OJO: Aquí la password debe ser 'root' porque así lo pusimos en el docker-compose
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect