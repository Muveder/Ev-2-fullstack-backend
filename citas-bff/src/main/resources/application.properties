# 1. Identidad del microservicio
spring.application.name=citas-bff

# 2. El puerto (fundamental para que no choque con el 8081 de Pacientes)
server.port=8085

# 3. Para que veas en la consola de VS Code qué datos se están enviando (útil para debug)
logging.level.org.springframework.cloud.openfeign=DEBUG

# 4. Evita errores comunes si los microservicios tardan un poco en responder
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000