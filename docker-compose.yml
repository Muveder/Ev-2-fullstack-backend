services:
  db:
    image: mysql:8.0
    container_name: rednorte-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rednorte_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  pacientes-ms:
    build: ./pacientes-microservicio
    container_name: pacientes-ms
    ports:
      - "8081:8081" # Externo 8081 -> Interno 8080
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/rednorte_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

  medicos-ms:
    build: ./medicos-microservicio
    container_name: medicos-ms
    ports:
      - "8082:8082" # Externo 8082 -> Interno 8080
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/rednorte_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

  citas-ms:
    build: ./citas-microservicio
    container_name: citas-ms
    ports:
      - "8083:8083" # Externo 8083 -> Interno 8080
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/rednorte_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

  citas-bff:
    build: ./citas-bff
    container_name: citas-bff
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
    depends_on:
      - pacientes-ms
      - medicos-ms
      - citas-ms

volumes:
  db_data: